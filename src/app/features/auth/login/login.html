<div
  class="relative min-h-screen w-full flex items-center justify-center p-6 bg-background overflow-hidden"
>
  <div class="absolute inset-0 z-0 pointer-events-none">
    <div
      class="absolute -top-20 -left-20 w-96 h-96 bg-primary/10 rounded-full blur-[100px] animate-pulse-slow"
    ></div>
    <div
      class="absolute -bottom-20 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-[100px] animate-pulse-slow"
    ></div>
  </div>

  <div class="relative z-10 w-full max-w-md animate-fade-in">
    <div class="text-center mb-8">
      <a
        routerLink="/"
        class="inline-flex items-center gap-2 mb-3 group transition-transform hover:scale-105"
      >
        <span class="text-3xl font-black tracking-tighter text-foreground">Riwaq</span>
        <span class="text-primary font-black text-3xl text-glow-sm">رواقء</span>
      </a>
      <p class="text-muted-foreground text-[9px] font-black tracking-[0.4em] opacity-50">
        Enter the Digital Sanctuary
      </p>
    </div>

    <div
      class="glass-card p-8 md:p-10 rounded-[2.5rem] border border-border/40 bg-card/40 backdrop-blur-3xl shadow-2xl relative overflow-hidden"
    >
      <div
        class="absolute top-0 left-1/4 right-1/4 h-[1px] bg-gradient-to-r from-transparent via-primary/40 to-transparent"
      ></div>

      @if (errorMessage()) {
        <div
          class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 flex items-start gap-3 animate-shake"
        >
          <i class="fas fa-exclamation-circle text-red-500 mt-0.5 text-xs"></i>
          <p class="text-[9px] font-black tracking-widest text-red-400 leading-relaxed">
            {{ errorMessage() }}
          </p>
        </div>
      }

      <form (submit)="onSubmit($event)" class="space-y-5">
        <div class="space-y-2">
          <label class="text-[9px] font-black tracking-[0.2em] text-primary ml-1"
            >Identity (Email)</label
          >
          <div class="relative group">
            <i
              class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-muted-foreground/30 text-xs group-focus-within:text-primary transition-colors"
            ></i>
            <input
              type="email"
              [formField]="loginForm.email"
              placeholder="scholar@riwaq.com"
              class="w-full pl-12 pr-6 py-4 bg-muted/5 border border-border/50 rounded-xl focus:border-primary/50 focus:ring-4 focus:ring-primary/5 outline-none transition-all font-bold text-sm text-foreground placeholder:opacity-20"
            />
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-[9px] font-black tracking-[0.2em] text-primary"
              >Key (Password)</label
            >
            <a
              routerLink="/auth/forgot-password"
              class="text-[8px] font-black text-muted-foreground/50 hover:text-primary transition-colors tracking-widest"
              >Forgot Key?</a
            >
          </div>
          <div class="relative group">
            <i
              class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-muted-foreground/30 text-xs group-focus-within:text-primary transition-colors"
            ></i>
            <input
              type="password"
              [formField]="loginForm.password"
              placeholder="••••••••"
              class="w-full pl-12 pr-6 py-4 bg-muted/5 border border-border/50 rounded-xl focus:border-primary/50 focus:ring-4 focus:ring-primary/5 outline-none transition-all font-bold text-sm text-foreground placeholder:opacity-20"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-5 bg-primary text-primary-foreground rounded-xl font-black text-[11px] tracking-[0.2em] shadow-glow hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-30 flex items-center justify-center gap-3"
        >
          @if (loading()) {
            <i class="fas fa-circle-notch animate-spin"></i>
          }
          <span>{{ loading() ? 'Verifying Identity...' : 'Open Sanctuary' }}</span>
        </button>
      </form>

      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <span class="w-full border-t border-border/40"></span>
        </div>
        <div class="relative flex justify-center text-[8px] font-black tracking-[0.4em]">
          <span class="bg-card px-4 text-muted-foreground/30">Universal Access</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-8">
        <button
          (click)="loginWithSocial('google')"
          class="flex items-center justify-center gap-3 bg-muted/5 border border-border/50 p-4 rounded-xl hover:bg-muted/10 hover:border-primary/30 transition-all group"
        >
          <i
            class="fab fa-google text-muted-foreground/40 group-hover:text-primary transition-colors text-sm"
          ></i>
          <span class="text-[9px] font-black tracking-widest text-foreground">Google</span>
        </button>

        <button
          class="relative flex items-center justify-center gap-3 bg-muted/5 border border-border/50 p-4 rounded-xl opacity-20 cursor-not-allowed"
        >
          <i class="fab fa-x-twitter text-muted-foreground/40 text-sm"></i>
          <span class="text-[9px] font-black tracking-widest text-foreground">X Access</span>
        </button>
      </div>

      <div class="pt-6 border-t border-border/40 text-center space-y-3">
        <p class="text-[9px] font-black tracking-[0.2em] text-muted-foreground/40">
          New to the Sanctuary?
        </p>
        <a
          routerLink="/auth/signup"
          class="group inline-flex items-center gap-2 text-primary font-black text-[10px] tracking-[0.2em] hover:text-primary-dark transition-all duration-300"
        >
          <span>Establish Scholar Account</span>
          <i
            class="fas fa-arrow-right text-[9px] group-hover:translate-x-1 transition-transform"
          ></i>
        </a>
      </div>
    </div>
  </div>
</div>
