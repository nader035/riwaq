<div
  class="fixed inset-0 z-[500] flex items-center justify-center p-4 md:p-8 bg-black/95 backdrop-blur-3xl transition-all duration-500 ease-in-out"
  [style.padding-left]="marginLeft()"
>
  <div
    class="glass-card w-full max-w-5xl rounded-[3.5rem] border border-white/5 shadow-2xl overflow-hidden flex flex-col md:flex-row max-h-[95vh] animate-fade-in relative"
  >
    <div
      class="flex-1 bg-white/[0.01] p-6 md:p-12 flex items-center justify-center border-b md:border-b-0 md:border-r border-white/5 overflow-y-auto custom-scrollbar"
    >
      <div
        #shareContent
        id="share-content"
        [class.aspect-story]="currentFormat() === 'story'"
        [class.aspect-post]="currentFormat() === 'post'"
        class="share-card-container bg-[#050505] w-full max-w-[320px] md:max-w-[360px] p-10 rounded-[3.5rem] border border-white/10 flex flex-col justify-between relative overflow-hidden shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)] transition-all duration-500"
      >
        <div
          class="absolute -top-20 -left-20 w-96 h-96 bg-primary/20 blur-[120px] rounded-full animate-pulse"
        ></div>
        <div
          class="absolute -bottom-20 -right-20 w-80 h-80 bg-blue-500/10 blur-[100px] rounded-full"
        ></div>
        <div
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-[0.03] pointer-events-none"
        ></div>

        <div class="relative z-10 flex justify-between items-start">
          <div class="space-y-1">
            <p class="text-primary text-[9px] font-black tracking-[0.6em] opacity-80">
              {{ totalDays() }} Days Challenge
            </p>
            <h4 class="text-5xl md:text-6xl font-black leading-none tracking-tighter text-white">
              Day {{ dayNumber }}
            </h4>
          </div>
          <div
            class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center relative bg-white/5 backdrop-blur-md"
          >
            <svg class="absolute inset-0 w-full h-full -rotate-90">
              <circle
                cx="24"
                cy="24"
                r="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                class="text-white/5"
              />
              <circle
                cx="24"
                cy="24"
                r="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                class="text-primary"
                stroke-dasharray="125"
                [attr.stroke-dashoffset]="125 - (dayNumber / 14) * 125"
              />
            </svg>
            <span class="text-[10px] font-black text-white relative z-10">#{{ dayNumber }}</span>
          </div>
        </div>

        <div class="space-y-8 relative z-10 flex-1 flex flex-col justify-center py-10">
          <div class="w-12 h-1.5 bg-primary/40 rounded-full"></div>
          <h2
            class="text-2xl md:text-3xl font-bold leading-[1.15] text-white tracking-tight line-clamp-4 drop-shadow-lg"
          >
            "{{ goal }}"
          </h2>

          @if (showTimer()) {
            <div class="space-y-1 pt-6 animate-fade-in border-l-2 border-primary/30 pl-5">
              <p class="text-[10px] font-black text-muted-foreground tracking-[0.3em]">
                Uninterrupted Focus
              </p>
              <p class="text-6xl md:text-7xl font-black text-white tabular-nums tracking-tighter">
                {{ focusTime }}<span class="text-xl text-primary/50 ml-1">hrs</span>
              </p>
            </div>
          }
        </div>

        <div class="flex justify-between items-end relative z-10 pt-8 border-t border-white/10">
          <div class="space-y-3">
            <div class="flex items-center gap-2">
              <span class="relative flex h-2 w-2">
                <span
                  class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
                ></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
              </span>
              <p class="text-[8px] font-black tracking-[0.4em] text-white/40">
                Journey Authenticated
              </p>
            </div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-2xl tracking-tighter text-white">Riwaq</span>
              <span class="font-black text-2xl text-primary text-glow-sm">رِوَاقء</span>
            </div>
          </div>

          <div class="text-white/10 group-hover:text-primary/20 transition-colors">
            <svg viewBox="0 0 24 24" class="w-14 h-14 fill-current">
              <path
                d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div
      class="w-full md:w-[380px] p-8 md:p-12 flex flex-col justify-between bg-white/[0.02] backdrop-blur-xl relative z-20"
    >
      <div class="space-y-10">
        <header class="flex justify-between items-start">
          <div class="space-y-2">
            <h3 class="text-2xl font-black tracking-tighter text-white">Share Studio</h3>
            <p class="text-[10px] text-muted-foreground tracking-[0.4em]">Export Configuration</p>
          </div>
          <button
            (click)="close.emit()"
            class="w-12 h-12 rounded-2xl flex items-center justify-center bg-white/5 hover:bg-white/10 transition-all group"
          >
            <i
              class="fas fa-times text-sm opacity-50 group-hover:opacity-100 group-hover:rotate-90 transition-all"
            ></i>
          </button>
        </header>

        <div class="space-y-8">
          <div class="space-y-4">
            <label class="text-[10px] font-black tracking-widest text-primary/60"
              >Canvas Format</label
            >
            <div class="grid grid-cols-2 gap-3 p-1.5 bg-white/5 rounded-2xl border border-white/5">
              <button
                (click)="setFormat('story')"
                [class.bg-primary]="currentFormat() === 'story'"
                [class.text-black]="currentFormat() === 'story'"
                class="py-4 rounded-xl text-[10px] font-black tracking-widest transition-all"
              >
                9:16 Story
              </button>
              <button
                (click)="setFormat('post')"
                [class.bg-primary]="currentFormat() === 'post'"
                [class.text-black]="currentFormat() === 'post'"
                class="py-4 rounded-xl text-[10px] font-black tracking-widest transition-all"
              >
                1:1 Post
              </button>
            </div>
          </div>

          <div class="space-y-4">
            <label class="text-[10px] font-black tracking-widest text-primary/60"
              >Display Settings</label
            >
            <button
              (click)="toggleTimer()"
              class="w-full py-5 flex items-center justify-center gap-4 rounded-2xl border border-white/10 bg-white/[0.02] text-[10px] font-black tracking-widest hover:bg-white/5 transition-all group"
            >
              <i
                class="fas text-primary"
                [class.fa-eye]="!showTimer()"
                [class.fa-eye-slash]="showTimer()"
              ></i>
              {{ showTimer() ? 'Hide Focus Data' : 'Show Focus Data' }}
            </button>
          </div>
        </div>
      </div>

      <div class="space-y-5">
        <button
          (click)="shareDirectly()"
          class="w-full py-6 bg-primary text-black rounded-[2rem] font-black text-xs tracking-[0.25em] shadow-[0_20px_50px_-15px_rgba(34,211,238,0.3)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3"
        >
          Download Expedition <i class="fas fa-arrow-down"></i>
        </button>
        <p class="text-[8px] text-center text-muted-foreground tracking-[0.5em] opacity-30">
          Powered by Riwaq Engine
        </p>
      </div>
    </div>
  </div>
</div>
