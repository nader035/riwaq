@if (auth.isAdmin()) {
  <div class="max-w-xl mx-auto py-12 px-6 animate-fade-in">
    <div
      class="glass-card p-8 md:p-10 rounded-[2.5rem] border-border/40 bg-card/20 backdrop-blur-xl space-y-8 relative overflow-hidden"
    >
      <div
        class="absolute -top-20 -right-20 w-40 h-40 bg-primary/5 blur-3xl rounded-full pointer-events-none"
      ></div>

      <header class="relative z-10 space-y-2">
        <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-foreground leading-none">
          Broadcast <span class="text-primary text-glow-sm">Center</span>
        </h2>
        <p class="text-[9px] font-black text-muted-foreground tracking-[0.3em] opacity-60">
          Push a real-time message to all active scholars
        </p>
      </header>

      <div class="relative z-10 space-y-6">
        <div class="space-y-2">
          <label class="text-[9px] font-black tracking-[0.2em] text-primary px-1"
            >Broadcast Title</label
          >
          <input
            [(ngModel)]="title"
            placeholder="e.g., Archive Maintenance"
            class="w-full bg-muted/5 border border-border/50 p-4 rounded-xl focus:border-primary/50 outline-none transition-all font-bold text-xs text-foreground placeholder:opacity-20"
          />
        </div>

        <div class="space-y-2">
          <label class="text-[9px] font-black tracking-[0.2em] text-primary px-1"
            >Your Message</label
          >
          <textarea
            [(ngModel)]="message"
            placeholder="Write the transmission details..."
            rows="3"
            class="w-full bg-muted/5 border border-border/50 p-4 rounded-xl focus:border-primary/50 outline-none transition-all font-bold text-xs text-foreground resize-none placeholder:opacity-20"
          ></textarea>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <button
            (click)="type.set('info')"
            class="p-4 rounded-xl border transition-all duration-300 flex flex-col items-center gap-2 group"
            [class.border-primary]="type() === 'info'"
            [class.bg-primary/10]="type() === 'info'"
            [class.text-primary]="type() === 'info'"
            [class.border-border/40]="type() !== 'info'"
            [class.bg-card/40]="type() !== 'info'"
            [class.text-muted-foreground]="type() !== 'info'"
          >
            <i class="fas fa-info-circle text-lg group-hover:scale-110 transition-transform"></i>
            <span class="text-[8px] font-black tracking-widest">Info</span>
          </button>

          <button
            (click)="type.set('success')"
            class="p-4 rounded-xl border transition-all duration-300 flex flex-col items-center gap-2 group"
            [class.border-emerald-500/50]="type() === 'success'"
            [class.bg-emerald-500/10]="type() === 'success'"
            [class.text-emerald-500]="type() === 'success'"
            [class.border-border/40]="type() !== 'success'"
            [class.bg-card/40]="type() !== 'success'"
            [class.text-muted-foreground]="type() !== 'success'"
          >
            <i class="fas fa-check-circle text-lg group-hover:scale-110 transition-transform"></i>
            <span class="text-[8px] font-black tracking-widest">Success</span>
          </button>

          <button
            (click)="type.set('rank')"
            class="p-4 rounded-xl border transition-all duration-300 flex flex-col items-center gap-2 group"
            [class.border-orange-500/50]="type() === 'rank'"
            [class.bg-orange-500/10]="type() === 'rank'"
            [class.text-orange-500]="type() === 'rank'"
            [class.border-border/40]="type() !== 'rank'"
            [class.bg-card/40]="type() !== 'rank'"
            [class.text-muted-foreground]="type() !== 'rank'"
          >
            <i class="fas fa-crown text-lg group-hover:scale-110 transition-transform"></i>
            <span class="text-[8px] font-black tracking-widest">Rank</span>
          </button>
        </div>

        <button
          (click)="sendBroadcast()"
          [disabled]="isSending() || !title || !message"
          class="w-full py-4 bg-primary text-primary-foreground rounded-xl font-black text-[10px] tracking-[0.3em] shadow-glow hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-30 disabled:grayscale disabled:scale-100"
        >
          @if (isSending()) {
            <i class="fas fa-spinner fa-spin mr-2"></i> Transmitting...
          } @else {
            <i class="fas fa-paper-plane mr-2"></i> Launch Broadcast
          }
        </button>
      </div>
    </div>
  </div>
} @else {
  <div
    class="h-[70vh] flex flex-col items-center justify-center space-y-6 animate-fade-in px-6 text-center"
  >
    <div
      class="w-20 h-20 rounded-3xl bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500/40 text-3xl mb-4 shadow-2xl"
    >
      <i class="fas fa-shield-alt"></i>
    </div>
    <div class="space-y-2">
      <h3 class="text-xl font-black tracking-tighter text-foreground">Access Denied</h3>
      <p
        class="text-[9px] font-black tracking-[0.4em] text-muted-foreground opacity-40 max-w-xs mx-auto leading-relaxed"
      >
        This archive terminal is restricted to higher-order architects only.
      </p>
    </div>
    <a
      routerLink="/app"
      class="text-[8px] font-black tracking-widest text-primary border-b border-primary/20 pb-1 hover:text-foreground transition-colors"
    >
      Return to Sanctuary
    </a>
  </div>
}
