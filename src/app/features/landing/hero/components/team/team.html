<div class="relative">
  <span id="team" class="absolute -top-20"></span>

  <section
    class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center py-16 md:py-24 overflow-hidden bg-transparent"
  >
    <div
      data-aos="zoom-in"
      data-aos-duration="2000"
      class="absolute top-0 left-1/4 w-72 h-72 bg-primary/5 blur-[100px] md:blur-[120px] rounded-full -z-10"
    ></div>
    <div
      data-aos="zoom-in"
      data-aos-delay="500"
      data-aos-duration="2000"
      class="absolute bottom-0 right-1/4 w-72 h-72 bg-emerald-400/5 blur-[100px] md:blur-[120px] rounded-full -z-10"
    ></div>

    <div class="max-w-7xl mx-auto px-6 w-full">
      
      <div 
        data-aos="fade-down"
        class="text-center mb-12 md:mb-20"
      >
        <div class="inline-block px-4 py-1 rounded-full border border-white/5 bg-white/[0.02] mb-6">
          <span class="text-[9px] font-black uppercase tracking-[0.4em] text-primary">The Collective</span>
        </div>
        <h2 class="text-4xl md:text-6xl font-black tracking-tighter mb-4 uppercase text-foreground leading-tight">
          The <span class="text-primary">Architects</span>
        </h2>
        <p class="text-muted-foreground font-medium text-xs md:text-sm max-w-xl mx-auto uppercase tracking-[0.2em] opacity-60 leading-relaxed">
          Building the future of digital focus, one pixel at a time.
        </p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 max-w-6xl mx-auto">
        @for (member of team; track member.name; let i = $index) {
          <div 
            class="group relative"
            data-aos="fade-up"
            [attr.data-aos-delay]="200 * (i + 1)" 
          >
            <div
              class="absolute inset-0 rounded-[3rem] blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"
              [ngClass]="{
                'bg-primary/10': member.colorClass === 'primary',
                'bg-emerald-400/10': member.colorClass === 'emerald-400',
                'bg-violet-400/10': member.colorClass === 'violet-400',
              }"
            ></div>

            <div
              class="glass-card p-8 md:p-10 rounded-[2.5rem] md:rounded-[3rem] text-center border border-white/5 relative z-10 hover:-translate-y-3 hover:border-white/10 transition-all duration-500 bg-white/[0.01] backdrop-blur-xl"
            >
              <div class="relative w-32 h-32 md:w-36 md:h-36 mx-auto mb-8">
                <div
                  class="absolute inset-0 rounded-[2.5rem] md:rounded-[2.8rem] rotate-6 group-hover:rotate-12 transition-transform duration-500 opacity-20"
                  [ngClass]="{
                    'bg-primary': member.colorClass === 'primary',
                    'bg-emerald-400': member.colorClass === 'emerald-400',
                    'bg-violet-400': member.colorClass === 'violet-400',
                  }"
                ></div>

                <div class="relative w-full h-full rounded-[2.2rem] md:rounded-[2.5rem] p-1 bg-white/10 overflow-hidden shadow-2xl">
                  <img
                    [src]="member.image"
                    [alt]="member.name"
                    class="w-full h-full object-cover scale-110 group-hover:scale-125 transition-all duration-700"
                  />
                </div>

                <div
                  class="absolute -right-2 top-0 w-10 h-10 rounded-xl flex items-center justify-center shadow-glow animate-bounce-slow text-xs"
                  [ngClass]="{
                    'bg-primary text-primary-foreground': member.colorClass === 'primary',
                    'bg-emerald-400 text-emerald-950': member.colorClass === 'emerald-400',
                    'bg-violet-400 text-white': member.colorClass === 'violet-400',
                  }"
                >
                  <i class="fas" [ngClass]="member.icon"></i>
                </div>
              </div>

              <h3 class="text-xl md:text-2xl font-black tracking-tight mb-2 uppercase text-foreground">
                {{ member.name }}
              </h3>
              <p
                class="font-black text-[9px] uppercase tracking-[0.3em] mb-4"
                [ngClass]="{
                  'text-primary': member.colorClass === 'primary',
                  'text-emerald-400': member.colorClass === 'emerald-400',
                  'text-violet-400': member.colorClass === 'violet-400',
                }"
              >
                {{ member.role }}
              </p>

              <p class="text-muted-foreground text-[12px] md:text-xs font-medium leading-relaxed mb-8 opacity-70">
                {{ member.bio }}
              </p>

              <div class="flex justify-center gap-3">
                @for (social of member.socials; track social.icon) {
                  <a
                    [href]="social.link"
                    target="_blank"
                    class="w-10 h-10 rounded-xl bg-white/[0.03] border border-white/5 flex items-center justify-center text-muted-foreground hover:text-primary hover:bg-white/[0.08] transition-all"
                  >
                    <i [class]="social.icon"></i>
                  </a>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </section>
</div>
