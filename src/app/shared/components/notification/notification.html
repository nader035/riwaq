<div class="fixed bottom-8 right-8 z-[200] flex flex-col gap-3 pointer-events-none">
  @for (toast of notify.toasts(); track toast.id) {
    <div
      class="glass-card p-5 rounded-2xl min-w-[300px] flex items-center gap-4 animate-toast pointer-events-auto border-l-4 shadow-2xl"
      [class.border-primary]="toast.type === 'success'"
      [class.border-red-400]="toast.type === 'error'"
      [class.border-blue-400]="toast.type === 'info'"
    >
      <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-background/40">
        @if (toast.type === 'success') {
          <i class="fas fa-check-circle text-primary text-lg"></i>
        } @else if (toast.type === 'error') {
          <i class="fas fa-exclamation-circle text-red-400 text-lg"></i>
        } @else {
          <i class="fas fa-info-circle text-blue-400 text-lg"></i>
        }
      </div>

      <div class="flex-1">
        <p class="text-[10px] font-black tracking-widest text-muted mb-0.5">
          {{ toast.type }}
        </p>
        <p class="text-xs font-bold text-foreground leading-tight">{{ toast.message }}</p>
      </div>

      <button
        (click)="notify.remove(toast.id)"
        class="text-muted/40 hover:text-foreground transition-colors p-2"
      >
        <i class="fas fa-times text-[10px]"></i>
      </button>
    </div>
  }
</div>
