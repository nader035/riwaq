<aside
  [class.translate-x-0]="sidebarService.isOpen()"
  [class.-translate-x-full]="!sidebarService.isOpen()"
  class="fixed h-full inset-y-0 left-0 w-64 border-r border-white/10 bg-black/60 backdrop-blur-2xl z-50 transition-transform duration-500 ease-in-out flex flex-col overflow-hidden shadow-2xl"
  role="navigation"
  aria-label="Sidebar Navigation"
>
  <div class="p-6 pb-4 flex items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2 group relative" aria-label="Riwaq Home">
      <span class="font-black text-2xl tracking-tighter text-foreground ">Riwaq</span>
      <span class="font-black text-2xl text-primary text-glow-sm">رِوَاقء</span>
    </a>
    <button
      (click)="sidebarService.close()"
      type="button"
      aria-label="Close Sidebar"
      class="text-muted hover:text-primary md:hidden active:scale-90 p-2"
    >
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
  </div>

  <nav class="flex-1 px-3 space-y-1 overflow-y-auto custom-scrollbar pt-2">
    @for (item of navItems; track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive="bg-primary/10 text-primary border-primary/20"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-muted font-black uppercase text-[10px] tracking-widest hover:bg-white/5 hover:text-foreground transition-all border border-transparent group"
        [attr.aria-label]="'Navigate to ' + item.label"
      >
        <i
          [class]="item.icon + ' w-4 text-base group-hover:scale-110 transition-transform'"
          aria-hidden="true"
        ></i>
        <span class="truncate">{{ item.label }}</span>
      </a>
    }

    @if (authService.isAdmin()) {
      <div class="pt-4 mt-4 border-t border-white/5 space-y-1">
        <p class="px-4 mb-2 text-[8px] font-black tracking-[0.4em] text-primary/40 uppercase">
          Command
        </p>
        <a
          routerLink="/app/admin"
          routerLinkActive="bg-primary/20 text-primary border-primary/30"
          (click)="sidebarService.close()"
          class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-primary/80 font-black uppercase text-[9px] tracking-widest hover:bg-primary/10 border border-dashed border-primary/20 bg-primary/5"
          aria-label="Access Admin Control Center"
        >
          <i class="fas fa-user-shield text-base" aria-hidden="true"></i>
          <span>Admin</span>
        </a>
      </div>
    }
  </nav>

  <div class="p-4 bg-white/[0.01] border-t border-white/5 space-y-3">
    <div
      class="glass-card p-2 rounded-2xl flex items-center gap-3 relative overflow-hidden border border-white/10 hover:border-primary/30 transition-all bg-white/[0.03]"
    >
      <div
        class="w-10 h-10 rounded-xl overflow-hidden border border-white/10 bg-background flex items-center justify-center shrink-0 shadow-inner"
      >
        @if (userProfile().avatar) {
          <img
            [src]="userProfile().avatar"
            [alt]="userProfile().name + ' Avatar'"
            class="w-full h-full object-cover"
          />
        } @else {
          <span class="font-black text-xs uppercase text-primary">{{ userProfile().initial }}</span>
        }
      </div>

      <div class="flex-1 min-w-0" aria-live="polite">
        <p class="text-[11px] font-black truncate text-foreground uppercase tracking-tight">
          {{ userProfile().name }}
        </p>
        <div class="flex items-center gap-1.5 text-orange-500">
          <i class="fas fa-fire text-[8px] animate-pulse" aria-hidden="true"></i>
          <span class="text-[8px] font-black uppercase tracking-widest"
            >{{ userProfile().streak }}d Streak</span
          >
        </div>
      </div>

      <button
        (click)="authService.logout()"
        type="button"
        aria-label="Terminate Session and Logout"
        title="Logout"
        class="w-8 h-8 rounded-lg flex items-center justify-center text-muted hover:text-red-500 hover:bg-red-500/10 transition-all active:scale-90"
      >
        <i class="fas fa-power-off text-[10px]" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</aside>
