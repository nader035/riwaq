<div class="fixed inset-0 z-[300] flex items-center justify-center p-6 animate-fade-in">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-xl"></div>

  <div
    class="glass-card w-full max-w-sm p-10 rounded-[3rem] border-primary/20 relative z-10 shadow-2xl scale-in text-center"
  >
    <div class="w-16 h-16 bg-red-400/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <i class="fas fa-exclamation-triangle text-red-400 text-xl"></i>
    </div>

    <h2 class="text-xl font-black tracking-tight mb-3">CONFIRM ACTION</h2>
    <p class="text-sm font-bold text-muted leading-relaxed mb-8">
      {{ confirmService.message() }}
    </p>

    <div class="flex gap-4">
      <button
        (click)="confirmService.cancel()"
        class="flex-1 py-4 glass-card rounded-2xl font-black text-[10px] tracking-widest hover:bg-white/5 transition-all"
      >
        Cancel
      </button>
      <button
        (click)="confirmService.confirm()"
        class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black text-[10px] tracking-widest shadow-lg shadow-red-500/20 hover:scale-105 transition-all"
      >
        Confirm
      </button>
    </div>
  </div>
</div>
