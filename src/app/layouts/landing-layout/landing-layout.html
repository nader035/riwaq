<div 
  class="min-h-screen bg-background relative overflow-hidden transition-colors duration-700"
  [style.--x.px]="mouseX()"
  [style.--y.px]="mouseY()"
>
  <div class="bg-ambient-glow"></div>

  <div class="bg-stars"></div>

  <div class="mouse-glow-dynamic"></div>

  <div class="relative z-50 flex flex-col min-h-screen">
    <app-landing-header></app-landing-header>
    <main class="flex-1">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </div>
</div>
