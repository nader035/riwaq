<app-notification></app-notification>

@if (confirmService.isOpen()) {
  <div class="fixed inset-0 z-[200] animate-fade-in">
    <app-confirm></app-confirm>
  </div>
}

<div 
  class="flex h-screen overflow-hidden bg-background relative z-10"
  [style.--x.px]="mouseX()"
  [style.--y.px]="mouseY()"
>
  
  <div class="bg-ambient-glow"></div>
  <div class=" opacity-40"></div> <div class="mouse-glow-dynamic"></div>

  <app-sidebar></app-sidebar>

  <main
    [class.md:pl-72]="sidebarService.isOpen()"
    class="flex-1 overflow-y-auto relative transition-all duration-500 ease-in-out bg-transparent custom-scrollbar"
  >
    @if (!sidebarService.isOpen()) {
      <button
        (click)="sidebarService.open()"
        class="fixed top-5 left-5 z-40 w-11 h-11 rounded-xl glass-card flex items-center justify-center text-primary shadow-glow-sm animate-fade-in hover:scale-110 active:scale-90 transition-all border-primary/20 group"
      >
        <i class="fas fa-bars transition-transform group-hover:rotate-90"></i>
      </button>
    }

    <div class="p-4 md:p-8 lg:p-10 max-w-[1440px] mx-auto relative z-10 min-h-full">
      <router-outlet></router-outlet>
    </div>

    <div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none -z-10 opacity-30"></div>
  </main>
</div>
