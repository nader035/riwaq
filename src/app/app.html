@if (notificationService.globalMessage(); as data) {
  <div
    class="fixed top-10 left-1/2 -translate-x-1/2 z-[500] w-full max-w-md px-6 animate-bounce-in"
  >
    <div
      class="glass-card p-6 rounded-[2rem] border-primary/20 bg-primary/10 backdrop-blur-3xl shadow-glow-lg flex items-center gap-5"
    >
      <div
        class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary text-xl shadow-inner"
      >
        <i
          class="fas"
          [class.fa-crown]="data.type === 'rank'"
          [class.fa-bullhorn]="data.type !== 'rank'"
        ></i>
      </div>

      <div>
        <h4 class="font-black uppercase text-[10px] tracking-widest text-primary">
          {{ data.title || 'Broadcast' }}
        </h4>
        <p class="text-sm font-bold text-foreground leading-tight">
          {{ data.message }}
        </p>
      </div>
    </div>
  </div>
}
<router-outlet></router-outlet>
